<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Menu | Fema Digital Solutions</title>
    <style>
        :root {
            /* Updated variable syntax for better reliability */
            --primary-green: #4CAF50;
            --dark-grey: #333;
            --light-bg: #f9f9f9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--light-bg);
            color: var(--dark-grey);
        }

        header {
            background-color: white;
            padding: 1rem;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 15px;
        }

        .menu-item {
            background: white;
            border-radius: 12px;
            display: flex;
            margin-bottom: 15px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }

        .menu-item:active {
            transform: scale(0.98);
        }

        .food-img {
            width: 110px;
            height: 110px;
            object-fit: cover;
            background-color: #eee;
        }

        .item-details {
            padding: 12px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .item-name {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 4px;
        }

        .amharic-name {
            color: #666;
            font-size: 0.95rem;
            margin-bottom: 8px;
        }

        .price {
            color: var(--primary-green);
            font-weight: 700;
            font-size: 1.1rem;
        }

        .dev-panel {
            background: #333;
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-top: 40px;
        }

        button {
            background: var(--primary-green);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <h2 id="hotel-name">Digital Menu</h2>
    <p id="slogan">A Better Way To Go</p>
</header>

<div class="container" id="menu-container">
    <!-- Menu items will be injected here by JavaScript -->
</div>

<div class="container">
    <div class="dev-panel">
        <h3>FEMA Developer Bulk Loader</h3>
        <textarea id="bulkData" style="width:100%; height:100px; margin-bottom:10px;" placeholder="Paste JSON array here..."></textarea>
        <button onclick="runBulkSync()">Sync to Google Sheets</button>
        <p id="status-msg" style="margin-top:10px; font-size:0.8rem;"></p>
    </div>
</div>

<script>
    // Configuration
    const SHEET_API_URL = "YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL"; // Replace with your actual URL

    // Example local data for immediate rendering
    let menuData = [
        { id: "1", enName: "Special Burger", amName: "ልዩ በርገር", price: 450, img: "https://via.placeholder.com/110", category: "fast-food" },
        { id: "2", enName: "Traditional Coffee", amName: "የሀበሻ ቡና", price: 60, img: "https://via.placeholder.com/110", category: "drinks" }
    ];

    function renderMenu(data) {
        const container = document.getElementById('menu-container');
        container.innerHTML = '';

        data.forEach(item => {
            const itemHtml = `
                <div class="menu-item">
                    <img src="${item.img}" class="food-img" alt="${item.enName}" loading="lazy">
                    <div class="item-details">
                        <div class="item-name">${item.enName}</div>
                        <div class="amharic-name">${item.amName}</div>
                        <div class="price">${item.price} ETB</div>
                    </div>
                </div>
            `;
            container.innerHTML += itemHtml;
        });
    }

    async function runBulkSync() {
        const status = document.getElementById('status-msg');
        const rawData = document.getElementById('bulkData').value;
        
        if (!rawData) {
            status.innerText = "Please paste data first.";
            return;
        }

        status.innerText = "Syncing with cloud...";

        try {
            // Using fetch to support external hosting (GitHub/Netlify)
            const response = await fetch(SHEET_API_URL, {
                method: 'POST',
                mode: 'no-cors', // Essential for Google Apps Script cross-domain
                headers: { 'Content-Type': 'application/json' },
                body: rawData
            });

            status.style.color = "#4CAF50";
            status.innerText = "Sync complete! Data pushed to Google Sheets.";
            
            // Optionally update the local UI with the new data
            const parsed = JSON.parse(rawData);
            renderMenu(parsed);
            
        } catch (error) {
            console.error("Sync Error:", error);
            status.style.color = "#ff4444";
            status.innerText = "Error: Check console or API URL.";
        }
    }

    // Initial Load
    window.onload = () => renderMenu(menuData);
</script>

</body>
</html>
